services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RAG_QDRANT_URL: http://qdrant:6333
      RAG_DATABASE_URL: postgresql+asyncpg://rag_user:rag_password@postgres:5432/rag_db
    depends_on:
      - qdrant
      - postgres

volumes:
  qdrant_data:
  pg_data:

